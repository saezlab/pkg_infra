settings_version: 0.0.1 # version of this configuration system in Saezlab


logging:
  version: 1   # version of this logging configuration

  disable_existing_loggers: false

  formatters:
    default:
      format: '[%(asctime)s.%(msecs)03d] %(levelname)s in %(module)s: %(message)s'
      datefmt: '%Y-%m-%d %H:%M:%S'
    simple:
      format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
    
  handlers:
    console:
      class: logging.StreamHandler
      level: DEBUG
      formatter: default
      filters: [allow_all]
      stream: ext://sys.stdout
    file:
      class: logging.FileHandler
      level: DEBUG
      formatter: default
      filename: logs/myapp.log
      encoding: utf-8
      delay: true

  loggers:
    saezlab_infra:
      level: DEBUG
      handlers: [console, file]
      propagate: false
      
  filters:
    allow_all:
      (): logging.Filter

  root:
    level: WARNING
    handlers: [console]

